{% extends "base.html" %}
{% block title %}注册 - 合同管理系统{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>📝 用户注册</h2>
        <form method="POST" action="{{ url_for('main.register') }}">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="至少2个字符" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="至少6个字符" required>
            </div>
            <div class="form-group">
                <label for="password_confirm">确认密码</label>
                <input type="password" id="password_confirm" name="password_confirm" class="form-control"
                       placeholder="再次输入密码" required>
            </div>
            <button type="submit" class="btn btn-success btn-block">注 册</button>
        </form>
        <div class="auth-footer mt-2">
            已有账号？<a href="{{ url_for('main.login_form') }}">立即登录</a>
        </div>
    </div>
</div>
{% endblock %}
